name: Build GTF Seller Live Tracker EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest  # Cloud base Windows server compile environment

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4  # Repo files load block[cite: 3]

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Production Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 PyQtWebEngine pyinstaller  # Removed pyyaml as it's no longer needed

    - name: Compile Script to Standalone EXE via PyInstaller
      run: |
        # Config flags removed entirely for smooth build execution
        pyinstaller --onefile --noconsole --clean --name="GTF_Seller_Live_Tracker" app.py

    - name: Upload Compiled EXE as GitHub Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GTF-Seller-Tracker-Windows-EXE  # Name of zip folder in artifacts[cite: 3]
        path: dist/GTF_Seller_Live_Tracker.exe # Absolute production output[cite: 3]
        retention-days: 7[cite: 3]
