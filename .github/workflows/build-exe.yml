name: Build GTF Seller Live Tracker EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        # FIXED: Cache option ko hata diya hai taaki requirements.txt ki zarurat na pade

    - name: Install Production Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 PyQtWebEngine pyinstaller

    - name: Compile Script to Standalone EXE via PyInstaller
      run: |
        pyinstaller --onefile --noconsole --clean --name="GTF_Seller_Live_Tracker" app.py

    - name: Upload Compiled EXE as GitHub Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GTF-Seller-Tracker-Windows-EXE
        path: dist/GTF_Seller_Live_Tracker.exe
        retention-days: 7
